name: Update Packages Repository

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'packages/*.deb'
      - '.github/workflows/main.yml'

jobs:
  update-repo:
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: 'true'

      - name: Import GPG key and setup gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "Error: GPG_PRIVATE_KEY secret is empty"
            exit 2
          fi

          export GNUPGHOME="$HOME/.gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          printf '%s\n' "$GPG_PRIVATE_KEY" > private.key
          chmod 600 private.key

          if ! grep -q 'BEGIN PGP PRIVATE KEY BLOCK' private.key; then
            echo "Error: private.key missing PGP header. Check secrets.GPG_PRIVATE_KEY."
            exit 2
          fi

          gpg --batch --yes --import private.key
          rm -f private.key

          echo "allow-preset-passphrase" > "$GNUPGHOME/gpg-agent.conf"
          echo "pinentry-mode loopback" >> "$GNUPGHOME/gpg.conf"
          echo "no-tty" >> "$GNUPGHOME/gpg.conf"
          gpg-connect-agent reloadagent /bye

      - name: Generate Packages and Release files
        env:
          GPG_TTY: /dev/null
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          USER: ${{github.repository_owner}}
          REPO: ${{github.event.repository.name}}
        run: |
          mkdir -p public/dists/stable/main/binary-arm64
          dpkg-scanpackages --arch arm64 packages > public/dists/stable/main/binary-arm64/Packages
          gzip -k -f public/dists/stable/main/binary-arm64/Packages

          cd public/dists/stable

          cat << EOF > Release
          Origin: https://$USER.github.io/$REPO
          Label: Droidian PKG
          Suite: stable
          Codename: stable
          Version: 1.0
          Architectures: arm64
          Components: main
          Description: Packages
          EOF

          apt-ftparchive release . >> Release

          echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --default-key $GPG_KEY_ID --clearsign -o InRelease Release
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --default-key $GPG_KEY_ID -abs -o Release.gpg Release

      - name: Copy keyring and move packages to public
        run: |
          cp droidian-pipa.asc public/
          mv packages public/packages

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
